name: Keep Render awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping le service Render
        env:
          RENDER_URL: ${{ vars.RENDER_URL }}
        run: |
          if [ -z "$RENDER_URL" ]; then
            echo "::error::La variable de dépôt RENDER_URL n'est pas définie (Settings > Secrets and variables > Actions > Variables)."
            exit 1
          fi
          curl -sSf --max-time 20 "$RENDER_URL/healthz"
